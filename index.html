<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1424" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Аппарат · поток поручений</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0d1424;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-image: radial-gradient(circle at 50% 0%, #1a2440 0%, #0d1424 70%);
      /* Телефон: без выделения, прокрутки и подсветки тапа. */
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      width: 100%;
      height: 100%;
    }
    #game canvas { display: block; }

    /* Подсказка повернуть телефон — только в портретной ориентации на узких экранах. */
    #rotate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 32px;
      text-align: center;
      background: #0d1424;
      color: #f4ead2;
    }
    #rotate .ico { font-size: 64px; animation: tilt 1.8s ease-in-out infinite; }
    #rotate h2 { margin: 0; font-size: 22px; color: #e8b04a; }
    #rotate p { margin: 0; font-size: 15px; color: #b8c2dc; max-width: 320px; line-height: 1.5; }
    @keyframes tilt { 0%,100% { transform: rotate(-12deg); } 50% { transform: rotate(78deg); } }

    @media (orientation: portrait) and (max-width: 820px) {
      #wrap { display: none; }
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="game"></div>
  </div>

  <div id="rotate">
    <div class="ico">📱</div>
    <h2>Поверни телефон</h2>
    <p>«Аппарат» играется в&nbsp;альбомной ориентации — так помещается весь кабинет и&nbsp;все три департамента.</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
